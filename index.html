<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
        }

        #gameCanvas {
            background: #2c3e50;
            border: 4px solid #34495e;
            border-radius: 10px;
            display: block;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-start {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-pause {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .instructions {
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 20px;
        }

        .mobile-controls button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1.5em;
            padding: 0;
            border-radius: 10px;
        }

        .mobile-controls .btn-up { grid-column: 2; grid-row: 1; }
        .mobile-controls .btn-left { grid-column: 1; grid-row: 2; }
        .mobile-controls .btn-down { grid-column: 2; grid-row: 2; }
        .mobile-controls .btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }

            #gameCanvas {
                width: 300px;
                height: 300px;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 贪吃蛇小游戏</h1>

        <div class="score-board">
            <div class="score-item">当前分数: <span id="currentScore">0</span></div>
            <div class="score-item">最高分数: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn-start" onclick="startGame()">开始游戏</button>
            <button class="btn-pause" onclick="togglePause()">暂停</button>
        </div>

        <div class="mobile-controls">
            <button class="btn-up" onclick="changeDirection('up')">↑</button>
            <button class="btn-left" onclick="changeDirection('left')">←</button>
            <button class="btn-down" onclick="changeDirection('down')">↓</button>
            <button class="btn-right" onclick="changeDirection('right')">→</button>
        </div>

        <div class="instructions">
            <h3>🎮 操作说明</h3>
            <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制蛇的移动</p>
            <p>吃掉红色食物得分，避免撞墙和撞到自己</p>
            <p>移动端可使用屏幕按钮控制</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束！</h2>
            <p class="final-score">最终得分: <span id="finalScore">0</span></p>
            <button class="btn-start" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 0, y: 0};
        let nextDirection = {x: 0, y: 0};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 200;
        let isPaused = false;
        let isGameRunning = false;

        // 更新最高分数显示
        document.getElementById('highScore').textContent = highScore;

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                gradient.addColorStop(0, '#38ef7d');
                gradient.addColorStop(1, '#11998e');
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(segment.x * gridSize + 7, segment.y * gridSize + 7, 3, 0, Math.PI * 2);
                    ctx.arc(segment.x * gridSize + 13, segment.y * gridSize + 7, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 食物光泽
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2 - 3,
                food.y * gridSize + gridSize / 2 - 3,
                3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // 更新游戏状态
        function update() {
            if (isPaused || !isGameRunning) return;

            direction = {...nextDirection};

            // 计算新蛇头位置
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('currentScore').textContent = score;
                generateFood();

                // 增加难度
                if (score % 50 === 0 && gameSpeed > 100) {
                    gameSpeed -= 20;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameUpdate, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        // 生成食物
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // 游戏更新循环
        function gameUpdate() {
            update();
            draw();
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning && !isPaused) return;

            if (isPaused) {
                isPaused = false;
                return;
            }

            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameSpeed = 100;
            isPaused = false;
            isGameRunning = true;

            document.getElementById('currentScore').textContent = score;
            generateFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdate, gameSpeed);
        }

        // 暂停/继续游戏
        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 改变方向
        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = {x: 0, y: -1};
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = {x: 0, y: 1};
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = {x: -1, y: 0};
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = {x: 1, y: 0};
                    break;
            }
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    e.preventDefault();
                    break;
                case ' ':
                    togglePause();
                    e.preventDefault();
                    break;
            }
        });

        // 初始绘制
        draw();
    </script>
</body>
</html>
